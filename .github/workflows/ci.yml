name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run lint checks
        run: REQUIRE_SHELLCHECK=1 make lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [busybox, dash]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y busybox dash

      - name: Verify shell target
        run: |
          case "${{ matrix.shell }}" in
            busybox) busybox sh -c 'echo ok' ;;
            dash) dash -c 'echo ok' ;;
          esac

      - name: Run shell test suite
        run: TEST_SHELL=${{ matrix.shell }} make test
